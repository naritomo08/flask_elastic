<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Backend Health</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="header">
        <div>
          <p class="eyebrow">Backend Health</p>
          <h1>疎通確認</h1>
          <p class="note">各 backend と Elasticsearch の接続状態を確認します。</p>
        </div>
        <div class="health-actions">
          <a class="reset-link" href="/">検索画面</a>
        </div>
      </section>

      <section class="results" aria-live="polite">
        <div id="health-summary" class="summary">
          <span>確認中</span>
        </div>
        <div id="health-body" class="health-grid"></div>
      </section>
    </main>
    <script src="/health.js"></script>
  </body>
</html>
