services:
  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend-python
      - backend-go
      - backend-java
      - backend-php
      - backend-ruby
      - backend-elixir
    restart: unless-stopped

  backend-python:
    build: ./backend-python
    ports:
      - "5005:5000"
    restart: unless-stopped
    environment:
      ELASTICSEARCH_URL: http://elastic1:9200
      ELASTICSEARCH_INDEX: logs-*
    extra_hosts:
      - "elastic1:192.168.11.20"

  backend-go:
    build: ./backend-go
    ports:
      - "5006:5000"
    restart: unless-stopped
    environment:
      ELASTICSEARCH_URL: http://elastic1:9200
      ELASTICSEARCH_INDEX: logs-*
    extra_hosts:
      - "elastic1:192.168.11.20"

  backend-java:
    build: ./backend-java
    ports:
      - "5007:5000"
    restart: unless-stopped
    environment:
      ELASTICSEARCH_URL: http://elastic1:9200
      ELASTICSEARCH_INDEX: logs-*
    extra_hosts:
      - "elastic1:192.168.11.20"

  backend-php:
    build: ./backend-php
    ports:
      - "5008:80"
    restart: unless-stopped
    environment:
      ELASTICSEARCH_URL: http://elastic1:9200
      ELASTICSEARCH_INDEX: logs-*
    extra_hosts:
      - "elastic1:192.168.11.20"

  backend-ruby:
    build: ./backend-ruby
    ports:
      - "5009:5000"
    restart: unless-stopped
    environment:
      ELASTICSEARCH_URL: http://elastic1:9200
      ELASTICSEARCH_INDEX: logs-*
    extra_hosts:
      - "elastic1:192.168.11.20"

  backend-elixir:
    build: ./backend-elixir
    ports:
      - "5010:5000"
    restart: unless-stopped
    environment:
      ELASTICSEARCH_URL: http://elastic1:9200
      ELASTICSEARCH_INDEX: logs-*
    extra_hosts:
      - "elastic1:192.168.11.20"

  backend-contract-tests:
    build: ./backend-python
    profiles:
      - test
    depends_on:
      - backend-python
      - backend-go
      - backend-java
      - backend-php
      - backend-ruby
      - backend-elixir
    volumes:
      - ./tests:/app/tests:ro
    environment:
      BACKEND_TARGETS: flask=http://backend-python:5000,go=http://backend-go:5000,java=http://backend-java:5000,php=http://backend-php:80,ruby=http://backend-ruby:5000,elixir=http://backend-elixir:5000
      RUN_SEARCH_CONTRACT_TESTS: ${RUN_SEARCH_CONTRACT_TESTS:-0}
    command: ["pytest", "/app/tests"]
