services:
  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "5001:5000"
    restart: unless-stopped
    volumes:
      - ./tests:/app/tests:ro
    environment:
      ELASTICSEARCH_URL: http://elastic1:9200
      ELASTICSEARCH_INDEX: logs-*
    extra_hosts:
      - "elastic1:192.168.11.20"
